# See README.md for deployment instructions.
AWSTemplateFormatVersion: 2010-09-09
Description: AWS CloudFormation template to create an Fargate cluster and task definition for running Aurora backup verification.

Parameters:
  HoneybadgerApiKey:
    Type: String
    Default: ""
    Description: Honeybadger API key used for reporting errors during execution of the ECS task
    NoEcho: True
  HoneybadgerSnsTopicArn:
    Type: String
    Description: SNS topic ARN created by alerting CloudFormation stack
    NoEcho: True

Resources:
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuroraVerifyBackupsEcsTaskRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonRDSFullAccess
      AssumeRolePolicyDocument: 
        Version: "2012-10-17"
        Statement: 
          - 
            Effect: "Allow"
            Principal: 
              Service: 
                - "ecs-tasks.amazonaws.com"
            Action: 
              - "sts:AssumeRole"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuroraVerifyBackupsEcsTaskExecutionRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: AllowPullECRImage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:aurora-verify-backups"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
        -
          Effect: "Allow"
          Principal:
            Service:
            - "ecs-tasks.amazonaws.com"
          Action:
          - "sts:AssumeRole"

  CWEInvokeECSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuroraVerifyBackupsCWERole
      AssumeRolePolicyDocument: 
        Version: "2012-10-17"
        Statement: 
          - 
            Effect: "Allow"
            Principal: 
              Service: 
                - "events.amazonaws.com"
            Action: 
              - "sts:AssumeRole"
      Policies:
        # Grant permissions for managing specific non-admin AWS::IAM resources.
        - PolicyName: AllowRuleToRunFargateTask
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                # Manually construct the Task Definition Family ARN, since !Ref returns the Task Definition Revision ARN
                Resource: !Ref TaskDefinition
                Condition:
                  ArnLike:
                    ecs:cluster: !GetAtt ECSCluster.Arn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt TaskRole.Arn
                  - !GetAtt TaskExecutionRole.Arn
                Condition:
                  StringLike:
                    iam:PassedToService: ecs-tasks.amazonaws.com
              - Effect: Allow
                Action:
                  - ecs:RunTask
                Resource: '*'
                Condition:
                  ArnLike:
                    ecs:cluster: !GetAtt ECSCluster.Arn
              - Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                Resource: '*'

  ECSCluster:
    Type: AWS::ECS::Cluster

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-aurora-verify-backups"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      Cpu: 256
      Memory: 0.5GB
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
      - Name: aurora-verify-backups
        Essential: true
        Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/aurora-verify-backups:latest"
        MemoryReservation: 512
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref CloudwatchLogsGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: !Sub "${AWS::StackName}-aurora-verify-backups"
        Environment:
          -
            Name: DB_CLUSTER_ID
            Value: aurora-verify-backups-cluster
          -
            Name: DB_INSTANCE_ID
            Value: aurora-verify-backups-instance
          -
            Name: DB_SNAPSHOT_IDENTIFIER_PREFIX
            Value: autoscale-prod-cluster
          -
            Name: DB_SUBNET_GROUP_NAME
            Value: !ImportValue VPC-DBSubnetGroup
          -
            Name: DB_SECURITY_GROUP_ID
            Value: !ImportValue VPC-DBSecurityGroup
          -
            Name: REGION
            Value: !Ref AWS::Region
          -
            Name: DB_INSTANCE_CLASS
            Value: db.t3.medium
          -
            Name: DB_ENGINE
            Value: aurora-mysql
          -
            Name: DB_NAME
            Value: dashboard_production
          -
            Name: HONEYBADGER_API_KEY
            Value: !Ref HoneybadgerApiKey
  CloudwatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "ECSLogGroup-${AWS::StackName}"
      RetentionInDays: 14
  OncePerDayRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-OncePerDay"
      ScheduleExpression: rate(1 day)
      State: ENABLED
      EventBusName: default
      Targets:
        - Id: FargateAuroraVerifyBackupsTarget
          Arn: !GetAtt ECSCluster.Arn
          RoleArn: !GetAtt CWEInvokeECSRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref TaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets:
                  - !ImportValue VPC-SubnetB
                  - !ImportValue VPC-SubnetC
                  - !ImportValue VPC-SubnetD
                  - !ImportValue VPC-SubnetE
                SecurityGroups:
                  - !ImportValue VPC-FrontendSecurityGroup
                AssignPublicIp: DISABLED
            CapacityProviderStrategy: []
            EnableECSManagedTags: false
            EnableExecuteCommand: false
  FailedInvocationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-FailedInvocations"
      AlarmDescription: Alarms when the "once per day" cloudwatch rule fails to start a Verify Backups fargate task.
      AlarmActions:
        - !Ref HoneybadgerSnsTopicArn
      Dimensions:
        - Name: RuleName
          Value: !Ref OncePerDayRule
      MetricName: FailedInvocations
      Namespace: AWS/Events
      Statistic: Sum
      ComparisonOperator: GreaterThanThreshold
      Threshold: 0.0
      Period: 300 # 5 minutes
      EvaluationPeriods: 1
      TreatMissingData: notBreaching

  NoInvocationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-NoInvocations"
      AlarmDescription: Alarms when the "once per day" cloudwatch rule doesn't attempt to start a Verify Backups fargate task at least once per day.
      AlarmActions:
      - !Ref HoneybadgerSnsTopicArn
      Dimensions:
      - Name: RuleName
        Value: !Ref OncePerDayRule
      MetricName: Invocations
      Namespace: AWS/Events
      Statistic: Sum
      ComparisonOperator: LessThanThreshold
      Threshold: 1.0
      Period: 86400 # One day
      EvaluationPeriods: 1
      TreatMissingData: breaching
