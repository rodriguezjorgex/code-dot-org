  relative_position: 1
  properties: '{"creative_commons_license":"Creative Commons BY-NC-SA","overview":"In
    this lesson, learners of all ages get an introductory experience with coding and
    computer science in a safe, supportive environment. This lesson has been designed
    for young learners, ages 4-10, but can be adapted for older learners using the
    differentiation suggestions provided.","preparation":"### One Week Before Your
    Hour of Code\n\n- Review the [Hour of Code Educator Guide](http://hourofcode.com/resources/how-to/)
    and [Best Practices from Successful Educators](http://www.slideshare.net/TeachCode/hour-of-code-best-practices-for-successful-educators-51273466)
    in order to begin to plan your Hour of Code event. \n- [Register your Hour of
    Code event](http://hourofcode.com) if you’d like to receive swag or classroom
    support.\n- Review and complete the online tutorial yourself: [Write your first
    computer program](https://studio.code.org/hoc/1) \n- Be sure to test it first
    before asking your students to complete it. Check your technology and decide if
    you need to troubleshoot anything in advance of your Hour of Code.\n\n### One
    Day Before Your Hour of Code\n\n- Print one or more of the [Exit Ticket examples](https://docs.google.com/a/code.org/document/d/1ylIlO7Pppk6W3Jt58VHS5mjvnshg9URvj3iCU0Ok6qY/edit?usp=sharing)
    at the end of this lesson plan, or create your own. \n- Each student who completes
    the activity should receive a [certificate](http://code.org/certificates). Print
    one for each student in advance to make this easier at the end of your Hour of
    Code.\n","purpose":"This lesson introduces the core CS concepts of coding and
    programming (using blocks), as well as simple debugging techniques.","student_overview":"In
    this lesson, learners of all ages get an introductory experience with coding and
    computer science in a safe, supportive environment. This lesson has been designed
    for young learners, ages 4-10, but can be adapted for older learners using the
    differentiation suggestions provided."}'
  lesson_group_id: 2034
  key: Maze
  has_lesson_plan: true
lesson_11395:
  id: 11395
  name: 'Star Wars: Building a Galaxy With Code (JavaScript)'
  absolute_position: 1
  script_id: 1301
  created_at: !ruby/object:ActiveSupport::TimeWithZone
    utc: 2025-05-14 19:13:38.000000000 Z
    zone: *1
    time: 2025-05-14 19:13:38.000000000 Z
  updated_at: !ruby/object:ActiveSupport::TimeWithZone
    utc: 2025-05-14 19:13:38.000000000 Z
    zone: *1
    time: 2025-05-14 19:13:38.000000000 Z
  lockable: false
  relative_position: 1
  properties: '{"creative_commons_license":"Creative Commons BY-NC-SA","overview":"In
    this lesson, learners of all ages get an introductory experience with coding and
    computer science in a safe, supportive environment. This lesson has two versions.
    This version uses both drag-drop blocks and JavaScript. Students need to be able
    to type on a keyboard. For older students on computers, learning JavaScript can
    be fun and provide an additional challenge. This version of the tutorial is also
    great if you have some students in your class who have already learned some coding.
    It is recommended for ages 11+.\n\nA [Blockly version](https://studio.code.org/s/starwarsblocks/lessons/1/levels/1)
    is also available and recommended for students on mobile devices without keyboards,
    younger students, and international students.","preparation":"### One Week Before
    Your Hour of Code\n\n- Review the [Hour of Code Educator Guide](http://hourofcode.com/resources/how-to/)
    and [Best Practices from Successful Educators](http://www.slideshare.net/TeachCode/hour-of-code-best-practices-for-successful-educators-51273466)
    in order to begin to plan your Hour of Code event. \n- Review and complete the
    online tutorial yourself: [Star Wars: Building a Galaxy with Code](https://studio.code.org/s/starwars/lessons/1/levels/1)
    \n- Be sure to test it first before asking your students to complete it. Check
    your technology and decide if you need to troubleshoot anything in advance of
    your Hour of Code.\n\n### One Day Before Your Hour of Code\n\n- Write the words
    “coding”, “programming” and “debugging” on the board or add them to your word
    wall if you have one.\n- Write the words \"Computer Science\" in the middle of
    your board or on piece of paper at the center of a bulletin board. This will serve
    as your [\"mind map\"](https://en.wikipedia.org/wiki/Mind_map) for the Getting
    Ready and Assessment activities.\n- Each student who completes the activity should
    receive a [certificate](http://code.org/certificates). Print one for each student
    in advance to make this easier at the end of your Hour of Code.\n","purpose":"This
    lesson introduces the core CS concepts of coding and programming including sequencing
    and events. The JavaScript version of the tutorial also lets the students experience
    typing code.","student_overview":"In this lesson, learners of all ages get an
    introductory experience with coding and computer science in a safe, supportive
    environment. This lesson has two versions. "}'
  lesson_group_id: 2569
  key: Hour of Code 2015
  has_lesson_plan: true
