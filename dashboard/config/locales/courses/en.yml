        networks-and-the-internet-2024:
          title: "[PILOT] Networks and the Internet"
          description_short: ''
          description_student: |-
            This unit explores how the Internet and networks function, their societal and ethical impacts, and their real-world applications. You examine data transmission, IP addressing, DNS resolution, network security, and AI’s role in cybersecurity. Through hands-on simulations and discussions, you analyze how data moves through networks, how protocols ensure secure communication, and how issues like the digital divide affect global connectivity. Ethical problem-solving and collaboration help you propose solutions to improve Internet access and security. Grounded in computational thinking and real-world relevance, this unit fosters curiosity, critical thinking, and innovation, preparing you to engage with networking technologies and their societal implications.

            ::: details [<i class="fa-solid fa-badge-check"></i> **By the end of this unit, you will be able to . . .**]
            - Describe how data is transmitted, routed, and reassembled over the Internet.
            - Explain the roles of IP addressing, DNS, and redundancy in ensuring efficient communication.
            - Analyze the role of AI in enhancing network security.
            - Assess the implications of the digital divide and propose strategies to promote equitable Internet access.
            - Evaluate the ethical considerations of AI in network security and propose responsible solutions.
            - Identify and describe roles in networking and cybersecurity, such as Network Engineers and AI Cybersecurity Specialists.
            - Analyze how these careers contribute to addressing societal challenges and improving technology.
            - Use abstraction, decomposition, and pattern recognition to solve problems related to Internet communication and security.
            - Propose and evaluate solutions to complex networking challenges, including security risks and accessibility issues.
            :::
