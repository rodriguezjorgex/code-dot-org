          description_teacher: "## Welcome\nWelcome to Code.org's free self-paced online learning for educators to get familiar with Computer Science Basics! After completing this professional learning experience, **you'll be comfortable with basic K-5 grade coding concepts**.\n\n### Find the learning that works for you\n* **Go at your own pace:** This self-paced learning experience is designed to give you control over your own learning. Suggested times are given for each lesson.  However, we encourage you to **engage with the content at your own pace.**\n\n* **Pick your content:** The content is organized in the suggested progression for teachers new to teaching computer science and Code.org. However, you can **engage with the content in the order that best meets your needs.** If you are already familiar with the Code.org platform, you might choose to skip the Overview. "
