        csp-2024:
          title: Computer Science Principles '24-'25
          description_short: Learn foundational computer science concepts.
          description_student: CSP introduces students to the foundational concepts of computer science and challenges them to explore how computing and technology can impact the world. The AP Program designed AP Computer Science Principles with the goal of creating leaders in computer science fields and attracting and engaging those who are traditionally underrepresented with essential computing tools and multidisciplinary opportunities.
          description_teacher: |-
            CSP introduces students to the foundational concepts of computer science and challenges them to explore how computing and technology can impact the world. The AP Program designed AP Computer Science Principles with the goal of creating leaders in computer science fields and attracting and engaging those who are traditionally underrepresented with essential computing tools and multidisciplinary opportunities.

            **Did You Know?**

            - Professional development is available to help you get started teaching CS Principles. <a href="https://code.org/educate/professional-learning/middle-high" target="blank" rel="noopener noreferrer">Click here</a> to learn more about professional learning opportunities in your region or <a href="https://code.org/educate/professional-development-online" target="blank" rel="noopener noreferrer">click here</a> to learn more about a self-paced online option.

            - You can find the *Syllabus*, *Course Vocab*, and other resources to help you implement this curriculum in the Teacher Resources menu below
