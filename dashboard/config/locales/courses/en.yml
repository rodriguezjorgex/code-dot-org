        self-paced-pl-ai-101-2024:
          title: AI 101 Professional Learning for Educators
          description_short: ''
          description_student: |-
            ## Welcome!
            Welcome to Code.org's self-paced online course for educators to get started with AI.

            This is a free, foundational online learning series for any teacher or educator interested in the groundbreaking world of artificial intelligence (AI) and its transformative potential in education.

            In this five-part series we'll demystify AI, explore responsible implementation, address bias, and showcase how AI-powered learning can revolutionize student outcomes.

            Join us on this journey of exploration and empowerment, and unlock the future of teaching with and about AI.

            ### Find the learning that works for you
            * **Go at your own pace:** This self-paced course is designed to put you in the driver's seat, and give you control over your own learning. Suggested times are given for each module and lesson.  However, we encourage you to **engage with the content at your own pace.**

