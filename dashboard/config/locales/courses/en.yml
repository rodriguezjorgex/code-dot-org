        programming-fundamentals-2024:
          title: "[PILOT] Programming Fundamentals"
          description_short: ''
          description_student: |-
            This unit introduces you to programming, algorithms, and ethical computing, exploring how Python programs are designed, debugged, and influenced by societal considerations. Through hands-on activities, you write, test, and refine programs using sequence, selection, iteration, and modular functions while applying human-centered design for inclusivity. You analyze the ethical implications of computing, including privacy, fairness, and accessibility, and propose risk mitigation strategies. Career-focused discussions connect programming skills to real-world pathways. Grounded in ethics, inclusivity, and computational thinking, this unit fosters persistence, critical thinking, and curiosity, empowering you to use technology for real-world problem-solving.

            ::: details [<i class="fa-solid fa-badge-check"></i> **By the end of this unit, you will be able to . . .**]
            - Define and explain the purpose of algorithms and their applications.
            - Design algorithms using sequence, selection, and iteration.
            - Analyze the functionality of algorithms and propose improvements.
            - Write Python programs using variables, conditional statements, loops, and functions.
            - Debug and test Python programs systematically to ensure correctness and reliability.
            - Use modular design principles to write reusable functions with parameters and return values.
            - Use AI tools to support problem-solving, algorithm design, and debugging, while recognizing their limitations and biases
            - Evaluate the ethical implications of using AI in programming and implement strategies for ethical and fair implementation.
            - Identify career pathways in computing and connect programming skills to real-world opportunities.
            - Use computational thinking principles to design, analyze, and troubleshoot programs.
            - Apply abstraction, decomposition, and pattern recognition to solve problems effectively.
            :::
          description_teacher: |-
            This unit introduces students to programming, algorithms, and ethical computing, exploring how Python programs are designed, debugged, and influenced by societal considerations. Through hands-on activities, students write, test, and refine programs using sequence, selection, iteration, and modular functions while applying human-centered design for inclusivity. They analyze the ethical implications of computing, including privacy, fairness, and accessibility, and propose risk mitigation strategies. Career-focused discussions connect programming skills to real-world pathways. Grounded in ethics, inclusivity, and computational thinking, this unit fosters persistence, critical thinking, and curiosity, empowering students to use technology for real-world problem-solving.

