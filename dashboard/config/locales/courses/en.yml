        csa-alt-2025:
          title: Computer Science A ('25-'26)
          description_short: Learn Java programming and software engineering skills.
          description_student: |-
            ## Overview

            Computer Science A (CSA) introduces students to software engineering and object-oriented programming and design using the Java programming language. This curriculum covers a broad range of topics, including the design of solutions to problems, the use of data structures to organize large sets of data, the development and implementation of algorithms to process data and discover new information, the analysis of potential solutions, and the ethical and social implications of computing systems.
          description_teacher: |-
            ## Overview

            Computer Science A (CSA) introduces students to software engineering and object-oriented programming and design using the Java programming language. This curriculum covers a broad range of topics, including the design of solutions to problems, the use of data structures to organize large sets of data, the development and implementation of algorithms to process data and discover new information, the analysis of potential solutions, and the ethical and social implications of computing systems.

            **Did You Know?**
            * Professional development is available to help you get started teaching CSA. <a href="https://code.org/educate/professional-learning/middle-high" target="blank" rel="noopener noreferrer">Click here</a> to learn more about professional learning opportunities in your region.

            * You can find the *Syllabus*, *Course Vocab*, and other resources to help you implement this curriculum in the Teacher Resources menu below.

            ---

            ## Curriculum Structure

            This version of the Code.org CSA curriculum organizes concepts using the same unit structure outlined in the AP Computer Science A Course and Exam Description (CED), including unit titles and themes. While the topics are mostly grouped into the same units as the CED, they may appear in a different order within each unit.

            As noted on page 19 of the CED, **the College Board's unit structure is optional** - it is intended to provide teachers "one possible sequence they can adopt or modify rather than having to build from scratch . . . Experienced AP teachers who are satisfied with their current course organization and exam results should feel no pressure to adopt these units, which comprise an optional sequence for this course."

            If you prefer to use our objects-first version of the curriculum, you can find it [**here**](https://studio.code.org/courses/csa-2025).
          version_title: "'25-'26"
