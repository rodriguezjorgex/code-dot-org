        customizing-llms-2025:
          title: Customizing Language Models (2025)
          description_short: This unit focuses on practical skills for tailoring AI models using techniques like prompt engineering and retrieval, while promoting transparency through model cards. Students explore how to customize AI chatbots to fit specific use-cases, then create their own chatbot to address a problem they care about.
          description_student: Learn to customize chatbots using AI Chat Lab
          description_teacher: |-
            This unit focuses on practical skills for tailoring AI models using techniques like prompt engineering and retrieval, while promoting transparency through model cards. Students explore how to customize AI chatbots to fit specific use-cases, then create their own chatbot to address a problem they care about.

            ##Just Starting this Unit?

            We recommend completing the free [**Exploring Generative AI Self-Paced Professional Learning Module**](https://studio.code.org/courses/self-paced-exploring-gen-ai). The module is designed to take 2-3 hours to complete. No previous computer science or AI experience is required.

            We also recommend watching the [5-Part Exploring Generative AI Video Series](https://www.youtube.com/playlist?list=PLzdnOPI1iJNfJLo5nNGPHo0xCd9Xw5lSs) which introduces key concepts for generative AI. The entire video series takes ~15 minutes to watch.

            ## Finished Teaching This Unit?
            Answer this [**short survey**](https://studio.code.org/form/exploring_with_generative_ai_post_survey?survey_data%5Bunit_number%5D=unit_2) to let the Code.org curriculum team know how the unit went.
          version_title: "'25-'26"
        coding-with-music-2025:
          title: Coding with Music
          description_short: This engaging module for grades 3–5 uses music to introduce core computer science concepts—sequencing, functions, and events—through creative lessons featuring real-world professionals from the music and tech industries.
          description_student: Get ready to explore computer science through the power of music! In this module, you'll learn how coding is a lot like making music—arranging blocks like lyrics, repeating patterns like beats, and making sounds respond to actions. You'll also meet real music and tech pros who use these skills in their jobs every day!
          description_teacher: A creative, engaging way to introduce core computer science concepts using music as the hook. Each lesson features a real professional from the music or tech world, helping students see themselves in these creative careers. In the first lesson, students learn sequencing by putting code blocks in order—just like a songwriter arranges lyrics and notes. In the second lessons, students explore functions by reusing patterns in their code, like a music producer building beats. And in Lesson 3, students dive into event-driven code, creating sounds that respond to actions—like a sound designer for a game.
          version_title: '2025'
        foundations-gen-ai-2025:
          title: Foundations of Generative AI
          description_short: Builds a foundational understanding of text-based generative AI models
          description_student: Learn how chatbots and large-language models work behind the scenes!
          description_teacher: |-
            This unit aims to build a foundational understanding of text-based generative AI models, focusing on core concepts over technical skills. Students will demystify generative AI models by exploring their internal structures through the familiar lens of input, storage, process, and output. They will gain insights into how these models represent language, the impact of training data on model performance, and the potential for bias. Using this knowledge they will be presented with scenarios throughout the unit where they can help educate individuals who feel powerless or lack agency in how AI is impacting their lives, or respond to individuals who have only read the hype headlines and offer feedback or criticism based on their knowledge of how these AI systems work.

            ##Just Starting this Unit?

            We recommend completing the free [**Exploring Generative AI Self-Paced Professional Learning Module**](https://studio.code.org/courses/self-paced-exploring-gen-ai). The module is designed to take 2-3 hours to complete. No previous computer science or AI experience is required.

            We also recommend watching the [5-Part Exploring Generative AI Video Series](https://www.youtube.com/playlist?list=PLzdnOPI1iJNfJLo5nNGPHo0xCd9Xw5lSs) which introduces key concepts for generative AI. The entire video series takes ~15 minutes to watch.

            ## Finished Teaching This Unit?
            Answer this [**short survey**](https://studio.code.org/form/exploring_with_generative_ai_post_survey?survey_data%5Bunit_number%5D=unit_1) to let the Code.org curriculum team know how the unit went.
