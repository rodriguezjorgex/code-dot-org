          description_short: 'Welcome to Code.org''s free self-paced online modules for educators to get started teaching CS Principles! After completing these online modules, you''ll be ready to get started teaching Code.org’s Computer Science Principles course with your students.

            '
          description_student: |-
            ## Welcome

            ##### Welcome to Code.org's free self-paced online modules for educators to get started teaching CS Principles! After completing these online modules, you'll be ready to get started teaching Code.org’s Computer Science Principles course with your students.

            ###Find the learning that works for you

            ##### **Go at your own pace**: These self-paced modules are designed to put you in the driver's seat and give you control over your own learning. Suggested times are given for each module and lesson. However, we encourage you to engage with the content at your own pace.

