        computer-systems-and-devices-2024:
          title: "[PILOT] Computer Systems and Devices"
          description_short: ''
          description_student: |-
            This unit explores how AI and computing systems process information, interact with hardware and software, and integrate emerging technologies like IoT and robotics. Through hands-on activities, you design and troubleshoot systems, analyze AI’s societal and ethical impacts, and apply human-centered design to solve real-world problems. AI Chat supports your learning by unpacking system layers, optimizing software, and evaluating AI-generated content for accuracy and fairness. Discussions on bias and debates on AI’s role in society encourage creativity, critical thinking, and collaboration. Grounded in ethics, inclusivity, and computational thinking, this unit helps you develop a deeper understanding of AI and its potential for equitable solutions.

            ::: details [<i class="fa-solid fa-badge-check"></i> **By the end of this unit, you will be able to . . .**]
            - Explain how computational systems process data and how hardware, software, and operating systems collaborate to perform tasks.
            - Investigate and optimize computing systems to improve performance and achieve specific goals.
            - Design computing solutions that integrate hardware and software to collect and exchange data.
            - Apply human-centered design principles to create effective and inclusive systems or protocols.
            - Analyze the societal and ethical implications of AI and emerging technologies, including issues related to privacy, fairness, and accessibility.
            - Assess the benefits and risks of AI in various industries and real-world applications.
            - Use AI tools to investigate problems, generate solutions, and evaluate the accuracy, fairness, and reliability of outputs.
            - Apply AI to analyze data, improve workflows, and develop creative solutions.
            - Describe the role of data in AI applications and how different types of data (e.g., audio, visual, environmental) are collected and used computationally.
            - Engage in inclusive collaboration by valuing diverse perspectives and addressing ethical concerns in computing projects.
            - Identify career pathways in computing and describe how AI and emerging technologies are transforming industries and disciplines.
            - Explore the interdisciplinary applications of computing concepts in solving real-world problems.
            :::
          description_teacher: |-
            This unit introduces students to AI and computing systems, exploring how they process information, interact with hardware and software, and integrate emerging technologies like IoT and robotics. Through hands-on activities, students design and troubleshoot systems, analyze AI’s societal and ethical impacts, and apply human-centered design to solve real-world problems. Using AI Chat, they unpack abstracted system layers, optimize software, and critique AI-generated outputs for accuracy and fairness. Activities like examining bias, and debating AI’s societal role foster creativity, critical thinking, and collaboration. Grounded in ethics, inclusivity, and computational thinking, this unit equips students to engage critically with AI, explore career pathways, and leverage technology for equitable solutions.

            ::: details [<i class="fa-solid fa-badge-check"></i> **By the end of this unit, students will be able to . . .**]
