        exploring-gen-ai-2024:
          title: Exploring Generative AI (2024)
          description_short: 'Learn the basics of generative AI: how AI works and how to use generative AI. '
          description_student: Learn How AI Works and How the Use Generative AI
          description_teacher: |-
            Exploring Generative AI is a two-unit curriculum that explores How AI Works and How to Use Generative AI. Students participate in hands-on activities that unpack the black box of generative AI through student-centered activities and class discussions, anchored by a video series that demystifies generative AI for a broad audience. With a firm foundation, students then learn to customize language models using the new AI Chat lab which provides students with the tools to select language models, apply system prompts, and curate retrieval information to customize their chatbot. Students create chatbots to solve a variety of problems, and interrogate the validity of responses and appropriate use of chatbots in society.

            ##Just Starting this Course?

            We recommend completing the free [**Exploring Generative AI Self-Paced Professional Learning Module**](https://studio.code.org/courses/self-paced-exploring-gen-ai-2024). The module is designed to take 2-3 hours to complete. No previous computer science or AI experience is required.

            We also recommend watching the [5-Part Exploring Generative AI Video Series](https://www.youtube.com/playlist?list=PLzdnOPI1iJNfJLo5nNGPHo0xCd9Xw5lSs) which introduces key concepts for generative AI. The entire video series takes ~15 minutes to watch.
          version_title: "'24-'25"
