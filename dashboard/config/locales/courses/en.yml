        csp-2025:
          title: Computer Science Principles
          description_short: Learn foundational computer science concepts.
          description_student: CSP introduces students to the foundational concepts of computer science and challenges them to explore how computing and technology can impact the world. The AP Program designed AP Computer Science Principles with the goal of creating leaders in computer science fields and attracting and engaging those who are traditionally underrepresented with essential computing tools and multidisciplinary opportunities.
          description_teacher: |-
            CSP introduces students to the foundational concepts of computer science and challenges them to explore how computing and technology can impact the world. The AP Program designed AP Computer Science Principles with the goal of creating leaders in computer science fields and attracting and engaging those who are traditionally underrepresented with essential computing tools and multidisciplinary opportunities.

            **Did You Know?**

            - Professional development is available to help you get started teaching CS Principles. <a href="https://code.org/educate/professional-learning/middle-high" target="blank" rel="noopener noreferrer">Click here</a> to learn more about professional learning opportunities in your region or <a href="https://code.org/educate/professional-development-online" target="blank" rel="noopener noreferrer">click here</a> to learn more about a self-paced online option.

            - You can find the *Syllabus*, *Course Vocab*, and other resources to help you implement this curriculum in the Teacher Resources menu below
          version_title: "'25-'26"
        exploring-gen-ai-2025:
          title: Exploring Generative AI (2025)
          description_short: 'Learn the basics of generative AI: how AI works and how to use generative AI. '
          description_student: Learn How AI Works and How the Use Generative AI
          description_teacher: |-
            Exploring Generative AI is a two-unit curriculum that explores How AI Works and How to Use Generative AI. Students participate in hands-on activities that unpack the black box of generative AI through student-centered activities and class discussions, anchored by a video series that demystifies generative AI for a broad audience. With a firm foundation, students then learn to customize language models using the new AI Chat lab which provides students with the tools to select language models, apply system prompts, and curate retrieval information to customize their chatbot. Students create chatbots to solve a variety of problems, and interrogate the validity of responses and appropriate use of chatbots in society.

            ##Just Starting this Course?

            We recommend completing the free [**Exploring Generative AI Self-Paced Professional Learning Module**](https://studio.code.org/courses/teaching-exp-gen-ai-2025). The module is designed to take 2-3 hours to complete. No previous computer science or AI experience is required.

            We also recommend watching the [5-Part Exploring Generative AI Video Series](https://www.youtube.com/playlist?list=PLzdnOPI1iJNfJLo5nNGPHo0xCd9Xw5lSs) which introduces key concepts for generative AI. The entire video series takes ~15 minutes to watch.
          version_title: "'25-'26"
        csd-2025:
          title: 'Computer Science Discoveries '
          description_short: An introductory computer science course that empowers students to create authentic artifacts
          description_student: Computer Science Discoveries (CS Discoveries) is an introductory computer science course that empowers you to create authentic artifacts and engage with computer science as a medium for creativity, communication, problem solving, and fun.
          description_teacher: |
            Computer Science Discoveries (CS Discoveries) is an introductory computer science course that empowers students to create authentic artifacts and engage with computer science as a medium for creativity, communication, problem solving, and fun.

            **Did You Know?**

            - Professional development is available to help you get started teaching CS Discoveries. [Click here](https://code.org/educate/professional-learning/middle-high) to learn more about professional learning opportunities in your region or [click here](https://code.org/educate/professional-development-online) to learn more about a self-paced online option.

            - This course has a flexible implementation and can be taught in different configurations based on the needs of each classroom. Check out the [CSD Implementation Guide](https://docs.google.com/document/d/1sM_1Oxb7TGp5gSfuMjs0X0_Tko9tm8QJ4N6L26NI_iE/view) for more information

            - You can access the [Course Syllabus](https://docs.google.com/document/d/1wqoDRuGVb8ZNoVjikkq1ZflA_C57r-YHmn3awpJmSJQ/view) and [Getting Started Guide](https://docs.google.com/document/d/1dMdllds_bhoi-SgtLH7eDdpSHjV_mHOD0-gf9VIgwZk/preview) to learn more about the course and get started.
          version_title: "'25-'26"
        computer-science-and-artificial-intelligence-foundations-2025:
          title: CS and AI Foundations (CSAIF)
          description_short: ''
          description_student: ''
          description_teacher: |
            CS and AI Foundations (CSAIF) introduces students to essential computer science concepts and the transformative role of artificial intelligence (AI) in today's world. Designed for high school students with no prior computer science or programming experience, this curriculum equips them with foundational skills in programming, data science, networks, cybersecurity, and AI. Students will gain hands-on experience with AI tools for problem-solving, debugging, and data analysis, while also exploring the ethical implications of technology, such as bias, privacy, and fairness.

            ## Prerequisites

            CSAIF is designed for high school students at any level of computer science experience. It is accessible to beginners with no prior programming knowledge, and it also provides opportunities for students with some background in computing to deepen their understanding of key topics.

            This curriculum can serve as an introductory course or as a bridge to more advanced studies, such as AP Computer Science A (CSA).

            No specific prior coursework is required, and all necessary concepts are introduced and reinforced through guided activities, collaborative learning, and hands-on projects.
          version_title: "'25-'26"
