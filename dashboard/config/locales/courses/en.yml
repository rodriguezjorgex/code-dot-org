          description_teacher: "Bring hands-on technology learning to Computer Science with our Maker course, designed around the micro:bit physical computing device. This course bridges the gap between digital and physical worlds, enabling students to transfer their computer programs into real-world applications with the micro:bit. Students will learn fundamental coding principles such as sequencing, loops, conditional logic, and event handling, and they will gain practical experience in how hardware and software can work together.\n\nNot sure where to begin? Start with the first micro:bit project pathway and work your way through all three pathways, ordered by increasing difficulty. Each of the three pathways has two components. First, students will develop their coding knowledge by completing skill-building lessons from Code.org’s CS Fundamentals course. Then, students will go to the micro:bit platform to code their physical computing projects.\n\n**New to micro:bit?** \n\nGet started with our [self-paced Professional Learning](https://studio.code.org/courses/microbitmakermodule-2024). \n\nThis self-paced course covers the following topics: \n- How to use the Code.org curriculum \n- How to setup a classroom on Code.org \n- How to use micro:bits \n- How to use the “Meet your micro:bit” project\n- How to setup a classroom on micro:bit\n- How to assess student learning \n"
          version_title: '2024'
