          description_short: 'In this module, students will create a haiku poem generator in a Mad Libs style using what they know about the elements of poetry, diction, and coding with variables. '
          description_student: Use Sprite Lab to make a Haiku Bot!
          description_teacher: "**Overview:** \nIn this module, students will create a Poem Bot that recites different versions of a haiku poem they write. First, students will study the structure and elements of a haiku poem by reading poems together, decomposing a haiku poem into its parts, and writing a haiku. Then, students will learn how computers can take in user input and store it in its memory and will build a Poem Bot. Once they’ve built their Poem Bot, they will test their programs with their classmates and complete the project by sharing their user-generated poems in a poetry circle."
          version_title: unversioned
