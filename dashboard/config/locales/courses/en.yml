        data-science-2024:
          title: "[PILOT] Data Science"
          description_short: Explore the world of data science using data visualization tools to analyze and interpret real-world phenomena.
          description_student: This Data Science curriculum introduces students to foundational data science principles and skills. Students will learn how to ask effective data questions, collect and clean datasets, and create compelling visualizations using tools such as CODAP (Unit 1) and Python (Unit 2). As students progress, they apply their programming and analytical skills to real-world datasets, gaining experience with essential data analysis techniques such as grouping, filtering, and statistical calculations. The curriculum culminates in projects that highlight the importance of ethical data practices, data storytelling, and creating actionable insights from complex data sets.
          description_teacher: Data Science builds a strong foundation in data analysis and visualization for students, using programming tools such as CODAP in Unit 1 and Python in Unit 2 to deepen their analytical skills. Through structured lessons and projects, students will learn how to use data science tools to transform raw data into meaningful visualizations. The units emphasize ethical considerations, guiding students through discussions and activities focused on data privacy, bias, and the societal impacts of data-driven decisions. By the end of each unit, students will be prepared to investigate and solve real-world problems using a comprehensive data-driven approach, culminating in a project that showcases their ability to craft compelling data stories.
          version_title: "'24-'25"
