# In development, this allows us to re-use our aws-google login from our local machine.
{{- if .Values.localDev.mounts.mountDotConfigGcloud }}
apiVersion: v1 
kind: PersistentVolumeClaim 
metadata:   
  name: {{ include "cdo.fullname" (merge (dict "component" "dot-config-gcloud") .) }}
  labels:
    {{ include "cdo.labels" (merge (dict "component" "dot-config-gcloud") .) | nindent 4 }}
spec:
  resources:
    requests:
      storage: 5Mi  
  accessModes:
    - ReadWriteMany
  storageClassName: hostpath
  volumeName: {{ include "cdo.fullname" (merge (dict "component" "dot-config-gcloud") .) }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "cdo.fullname" (merge (dict "component" "dot-config-gcloud") .) }}
  labels:
    {{ include "cdo.labels" (merge (dict "component" "dot-config-gcloud") .) | nindent 4 }}
spec:
  capacity:
    storage: 5Mi
  accessModes:
    - ReadWriteMany
  storageClassName: hostpath
  hostPath:
    path: {{ .Values.localDev.mounts.hostPaths.home }}/.config/gcloud
{{- end }}
