# We use MinIO to emulate S3 in dev/testing environments.
{{- if .Values.services.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cdo.fullname" (merge (dict "component" "minio") .) }}
  labels:
    {{ include "cdo.labels" (merge (dict "component" "minio") .) | nindent 4 }}
spec:
  ports:
    - name: api
      port: 9000
    - name: console
      port: 9001
  selector:
    {{ include "cdo.selectorLabels" (merge (dict "component" "minio") .) | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cdo.fullname" (merge (dict "component" "minio") .) }}
  labels:
    {{ include "cdo.labels" (merge (dict "component" "minio") .) | nindent 4 }}
spec:
  serviceName: {{ include "cdo.fullname" (merge (dict "component" "minio") .) }}
  replicas: 1
  selector:
    matchLabels:
      {{ include "cdo.selectorLabels" (merge (dict "component" "minio") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{ include "cdo.labels" (merge (dict "component" "minio") .) | nindent 8 }}
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-02-07T23-21-09Z
        args: ["server", "/data"]
        ports:
        - name: api
          containerPort: 9000
        - name: console
          containerPort: 9001
        env:
        - name: MINIO_ROOT_USER
          value: "{{ .Values.services.minio.username }}"
        - name: MINIO_ROOT_PASSWORD
          value: "{{ .Values.services.minio.password }}"
        volumeMounts:
        - name: minio-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: minio-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.services.minio.storage | default "1Gi" }}
{{- end }}
---
{{- if .Values.services.minio.runSetupS3Job }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cdo.fullname" (merge (dict "component" "minio-setup-s3-job") .) }}
  labels:
    {{ include "cdo.labels" (merge (dict "component" "minio-setup-s3-job") .) | nindent 4 }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{ include "cdo.labels" (merge (dict "component" "minio-install") .) | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
      - name: minio-install
        image: amazon/aws-cli
        command:
          - /bin/bash
          - -c
          - |
            # This is lifted from code-dot-org/docker/developers/install-s3.sh
            set -e

            # Prevent aws cli from using interactive paging or failing when less isn't found
            # See: https://stackoverflow.com/questions/57953187/aws-cli-has-no-output
            export AWS_PAGER=

            export AWS_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL}

            # Create all buckets that our application depends on. Most of these buckets are
            # intended to store user-created data, so they just need to exist so we can
            # upload to them. Some of them, however, are expected to contain specific data
            # necessary for initial seeding or some niche features. See
            # docker/developers/utils/s3/populator.rb for details of how we address that.
            #
            # TODO infra: figure out a way we can declare these dependencies just once in a
            # way that will work for either a prod-like environment or local development.
            bucket_names=(\
              "cdo-ai"\
              "cdo-animation-library"\
              "cdo-restricted"\
              "cdo-sound-library"\
              "cdo-v3-animations"\
              "cdo-v3-assets"\
              "cdo-v3-files"\
              "cdo-v3-libraries"\
              "cdo-v3-sources"\
              "videos.code.org"\
            )

            # Note: some other buckets which we do utilize locally but don't necessarily
            # require be present include:
            #
            # cdo-build-package
            # cdo-nces
            # cdo-v3-trained-ml-models
            # images.code.org
            # pd-workshop-surveys

            for bucket_name in "${bucket_names[@]}"; do
              # Use the standard aws CLI to inspect and create buckets; since we know
              # AWS_ENDPOINT_URL is targeting localhost, we can be confident this will not
              # affect our actual AWS account.
              if [[ -z $(aws s3api head-bucket --bucket "${bucket_name}" 2>&1) ]]; then
                echo "Creating s3 bucket ${bucket_name} [EXISTS]"
              else
                echo "Creating s3 bucket ${bucket_name}"
                aws s3api create-bucket --bucket ${bucket_name} --object-lock-enabled-for-bucket

                # Many (but not all) of these buckets have versioning enabled in our
                # production environment; for a balance of similarity with prod and
                # simplicity of this script, we enable it for everything. This is probably
                # not strictly necessary, but will hopefully reduce surprises.
                echo "Versioning s3 bucket ${bucket_name}"
                aws s3api put-bucket-versioning --bucket ${bucket_name} --versioning-configuration Status=Enabled
              fi
            done

            echo "setup-s3 COMPLETE"
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "local-development"
        - name: AWS_SECRET_ACCESS_KEY
          value: "allstudents"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: AWS_S3_ENDPOINT_URL
          value: "http://{{ include "cdo.fullname" (merge (dict "component" "minio") .) }}:9000"
{{- end }}
