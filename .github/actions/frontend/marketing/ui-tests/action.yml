name: "Run Marketing UI Tests"
description: "Runs the marketing UI tests"

inputs:
  CONTENTFUL_SPACE_ID:
    description: "Contentful Space ID"
    required: true
  DRAFT_MODE_TOKEN:
    description: "Marketing App Draft Mode Token"
    required: true
  APPLITOOLS_API_KEY:
    description: "Applitools API Key"
    required: true
  APPLICATION_BASE_ADDRESS:
    description: "The base URL for the application. Defaults to http://localhost:3001"
    default: "localhost:3001"
  STAGE:
    description: "local, pr, test, or production"
    required: true

runs:
  using: composite

  steps:
    - name: Install Playwright
      shell: bash
      run: yarn playwright install --with-deps
      working-directory: ./frontend/apps/marketing

    - name: Prepare UI Test Environment
      shell: bash
      working-directory: ./frontend/apps/marketing
      run: |
        echo "APPLITOOLS_API_KEY=${{ inputs.APPLITOOLS_API_KEY }}
        DRAFT_MODE_TOKEN=${{ inputs.DRAFT_MODE_TOKEN }}" >> .env

    - name: UI Tests
      shell: bash
      env:
        STAGE: ${{ inputs.stage }}
        APPLICATION_BASE_ADDRESS: ${{ inputs.APPLICATION_BASE_ADDRESS }}
      run: yarn workspace @code-dot-org/marketing test:ui:ci
      working-directory: ./frontend

    - name: Upload Playwright reports
      if: failure()
      id: deployment
      uses: actions/upload-pages-artifact@v3
      with:
        path: frontend/apps/marketing/playwright-report
        name: playwright-report

    - name: Run Google Lighthouse Audits
      uses: treosh/lighthouse-ci-action@2f8dda6cf4de7d73b29853c3f29e73a01e297bd8
      env:
        HTTP_PROTOCOL: ${{ inputs.APPLICATION_BASE_ADDRESS == 'localhost:3001' && 'http' || 'https' }}
      with:
        urls: ${{ env.HTTP_PROTOCOL }}://${{ inputs.APPLICATION_BASE_ADDRESS }}/en-US/engineering/all-the-things
        uploadArtifacts: true
        temporaryPublicStorage: true
        configPath: './frontend/apps/marketing/.lighthouserc.js'
