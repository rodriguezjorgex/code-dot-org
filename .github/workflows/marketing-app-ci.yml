name: Marketing-CI

on:
  pull_request:
    branches:
      - staging
      - staging-next
    paths:
        - 'frontend/**'

defaults:
  run:
    shell: bash
    working-directory: ./frontend

jobs:
    build:
        runs-on: ubuntu-24.04

        steps:
            - uses: actions/checkout@v4
              with:
                lfs: true
                sparse-checkout: |
                  frontend
                  .github

            - name: Setup Frontend
              uses: ./.github/actions/frontend/setup

            - name: Lint
              run: yarn lint --filter @code-dot-org/marketing

            - name: Build
              run: yarn build --filter @code-dot-org/marketing

            - name: Unit Tests
              run: yarn test --filter @code-dot-org/marketing

    ui-tests:
      runs-on: ubuntu-24.04

      steps:
        - uses: actions/checkout@v4
          with:
            lfs: true
            sparse-checkout: |
              frontend
              .github

        - name: Setup Frontend
          uses: ./.github/actions/frontend/setup

        - name: UI Tests
          uses: ./.github/actions/frontend/marketing/ui-tests
          with:
            STAGE: pr
            CONTENTFUL_SPACE_ID: ${{ vars.CONTENTFUL_SPACE_ID }}
            CONTENTFUL_TOKEN: ${{ secrets.CONTENTFUL_TOKEN}}
            APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY}}

